name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: easyinventory_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Black (formatting)
        run: python -m black --check app/ tests/

      - name: Mypy (type checking)
        run: python -m mypy app/

      - name: Pytest (tests)
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/easyinventory_test
          COGNITO_REGION: us-east-1
          COGNITO_USER_POOL_ID: test
          COGNITO_APP_CLIENT_ID: test
          BOOTSTRAP_ADMIN_EMAIL: test@test.com
        run: python -m pytest tests/ -v